<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS2 Roulette</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        :root {
            --bg-color: #121418; /* Как темный фон профиля */
            --glass-bg: rgba(30, 34, 42, 0.8);
            --primary: #ff5e00; /* Огненный оранжевый */
            --secondary: #ffb300; /* Желтый акцент */
            --text: #ffffff;
            --border: rgba(255, 94, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #301608 0%, transparent 70%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .screen { display: none; width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .screen.active { display: flex; flex-direction: column; gap: 20px; align-items: center; }

        .glass-box {
            background: var(--glass-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 0 20px rgba(255, 94, 0, 0.2), inset 0 0 10px rgba(255, 179, 0, 0.1);
            backdrop-filter: blur(10px);
            width: 100%;
        }

        h1, h2 { text-transform: uppercase; font-weight: 900; background: linear-gradient(135deg, var(--secondary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        input {
            width: 100%; padding: 12px; margin-top: 10px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--border);
            color: #fff; border-radius: 8px; outline: none; font-size: 16px;
        }
        
        button {
            width: 100%; padding: 14px; margin-top: 15px;
            background: linear-gradient(135deg, var(--primary), #d93d00);
            color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 94, 0, 0.4);
        }
        button:active { transform: scale(0.95); }
        
        /* Рулетка (CS2 Лента) */
        .roulette-container {
            width: 100%; height: 140px; background: rgba(0,0,0,0.6);
            border: 2px solid var(--primary); border-radius: 8px;
            overflow: hidden; position: relative; display: flex; align-items: center;
        }
        /* Линия по центру (прицел) */
        .roulette-container::after {
            content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
            background: var(--secondary); box-shadow: 0 0 10px var(--secondary); z-index: 10;
        }
        .tape {
            display: flex; height: 100%; align-items: center;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); /* Плавное замедление */
            will-change: transform;
        }
        .item {
            width: 120px; min-width: 120px; height: 120px; margin: 0 5px;
            background: #1e222a; border: 1px solid #333; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .item img { width: 80px; height: 80px; object-fit: contain; }
        .item span { font-size: 10px; color: #ccc; margin-top: 5px; text-align: center; }

        #top-bar { position: absolute; top: 20px; width: 100%; text-align: center; font-weight: bold; }
        .admin-btn { background: #333; margin-top: 20px; border: 1px solid #555; box-shadow: none; }
    </style>
</head>
<body>

    <div id="top-bar" style="display: none;">Прокрутов: <span id="spins-count" style="color:var(--primary)">0</span></div>

    <!-- Загрузка -->
    <div id="screen-loading" class="screen active">
        <h2>Загрузка...</h2>
    </div>

    <!-- Экран Подписки -->
    <div id="screen-sub" class="screen">
        <div class="glass-box">
            <h2>Доступ закрыт</h2>
            <p style="margin-top: 10px">Подпишись на наш канал, чтобы крутить рулетку!</p>
            <button onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/твой_канал')">Перейти в канал</button>
            <button onclick="checkUser()" style="background: transparent; border: 1px solid var(--primary)">Я подписался</button>
        </div>
    </div>

    <!-- Экран Промокода (Первый) -->
    <div id="screen-main" class="screen">
        <div class="glass-box">
            <h2>Введи промокод</h2>
            <input type="text" id="promo-input" placeholder="CODE123">
            <button onclick="usePromo()">Активировать</button>
        </div>
        <div class="glass-box" style="margin-top: 20px">
            <h2>Рулетка</h2>
            <p style="margin: 10px 0; font-size: 14px; color: #ccc">Приглашай друзей и получай прокруты!</p>
            <button onclick="openRoulette()">Перейти к рулетке</button>
            <button onclick="copyRef()" style="background: #2a2e38">Копировать реф. ссылку</button>
        </div>
        <button id="btn-admin-panel" class="admin-btn" style="display:none;" onclick="showScreen('screen-admin')">Админ Панель</button>
    </div>

    <!-- Экран Рулетки -->
    <div id="screen-roulette" class="screen">
        <div class="glass-box" style="padding: 15px">
            <div class="roulette-container">
                <div class="tape" id="roulette-tape">
                    <!-- Предметы генерируются в JS -->
                </div>
            </div>
            <button id="spin-btn" onclick="spinRoulette()">Крутить (-1 прокрут)</button>
            <button onclick="showScreen('screen-main')" style="background: #2a2e38; margin-top: 10px">Назад</button>
        </div>
    </div>

    <!-- Экран Приза -->
    <div id="screen-win" class="screen">
        <div class="glass-box">
            <h2>Твой выигрыш!</h2>
            <img id="win-img" src="" style="width: 150px; height: 150px; margin: 15px 0">
            <h3 id="win-name">Предмет</h3>
            <p style="font-size:12px; margin-top: 10px; color: #aaa">Введи свою Steam Trade URL</p>
            <input type="text" id="trade-input" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=...">
            <button onclick="sendTrade()">Забрать приз</button>
        </div>
    </div>

    <!-- Админка -->
    <div id="screen-admin" class="screen">
        <div class="glass-box">
            <h2>Добавить приз</h2>
            <input type="text" id="ap-name" placeholder="Название (AK-47 | Redline)">
            <input type="text" id="ap-img" placeholder="URL Картинки (png)">
            <input type="number" id="ap-chance" placeholder="Шанс (вес, например 10)">
            <button onclick="addPrize()">Добавить</button>
            <button onclick="showScreen('screen-main')" style="background: #2a2e38">Назад</button>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // --- НАСТРОЙКИ ---
    const API_URL = "https://cs.kviappsgames.workers.dev/api"; // ВСТАВЬ ССЫЛКУ НА СВОЙ ВОРКЕР!
    const tg_id = tg.initDataUnsafe?.user?.id || 123456789; // Fallback для тестов в браузере
    const username = tg.initDataUnsafe?.user?.username || "unknown";
    
    let currentPrize = null;
    let userSpins = 0;

    // Смена экранов
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-main' || id === 'screen-roulette') {
            document.getElementById('top-bar').style.display = 'block';
        } else {
            document.getElementById('top-bar').style.display = 'none';
        }
    }

    // API Запросы
    async function apiCall(endpoint, method = "GET", body = null) {
        const url = `${API_URL}${endpoint}${endpoint.includes('?') ? '&' : '?'}tg_id=${tg_id}`;
        const options = { method, headers: {} };
        if (body) {
            options.headers['Content-Type'] = 'application/json';
            options.body = JSON.stringify(body);
        }
        const res = await fetch(url, options);
        return res.json();
    }

    // Инициализация
    async function checkUser() {
        showScreen('screen-loading');
        try {
            const data = await apiCall('/user');
            if (!data.isSubbed && tg.initDataUnsafe?.user) { // Если не подписан (пропускаем в браузере без ТГ)
                showScreen('screen-sub');
                return;
            }
            
            userSpins = data.user.spins;
            document.getElementById('spins-count').innerText = userSpins;
            
            if (data.isAdmin) document.getElementById('btn-admin-panel').style.display = 'block';
            
            showScreen('screen-main');
        } catch(e) { alert("Ошибка подключения к серверу"); }
    }

    // Промокод
    async function usePromo() {
        const code = document.getElementById('promo-input').value;
        if(!code) return;
        const res = await apiCall('/promo', 'POST', { code });
        if(res.error) return tg.showAlert(res.error);
        
        userSpins += res.spins;
        document.getElementById('spins-count').innerText = userSpins;
        tg.showAlert(`Успешно! Получено прокрутов: ${res.spins}`);
        document.getElementById('promo-input').value = "";
    }

    // Рефералка
    function copyRef() {
        const botUsername = "ТВОЙ_БОТ_ЮЗЕРНЕЙМ"; // Вставь юзернейм своего бота (без @)
        const link = `https://t.me/${botUsername}?start=${tg_id}`;
        navigator.clipboard.writeText(link);
        tg.showAlert("Реферальная ссылка скопирована!");
    }

    function openRoulette() {
        showScreen('screen-roulette');
        generateFakeTape();
    }

    // Генерация визуала ленты
    function generateFakeTape() {
        const tape = document.getElementById('roulette-tape');
        tape.style.transition = 'none';
        tape.style.transform = 'translateX(0)';
        tape.innerHTML = '';
        
        // Вставляем 100 заглушек
        const dummyImgs =[
            'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJemkV092lnYmGmOHLPr7Vn35cppQiiOuQpoml3wW18xdkNTjxd9CQdwM_ZlrT-lW_k-e-gJ-Iu8yYzyEwuSE8pSGK2A/256fx256f',
            'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposr-kLAtl7PTbTjlH7du6kb-OqODxIYTCk2pd18l4jeHVu43w2Fbk-EVkMGn2cI_EIFVqYwmF_FK7x-rmh5W5tc7XiSw0K-A-RXI/256fx256f'
        ];
        
        for(let i=0; i<80; i++) {
            const isTarget = i === 65; // Победный предмет будет под индексом 65
            const img = isTarget ? '' : dummyImgs[Math.floor(Math.random()*dummyImgs.length)];
            tape.innerHTML += `<div class="item" id="item-${i}"><img src="${img}"><span>...</span></div>`;
        }
    }

    // Вращение
    async function spinRoulette() {
        if (userSpins <= 0) return tg.showAlert("У вас нет прокрутов!");
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;

        const res = await apiCall('/spin', 'POST');
        if(res.error) { btn.disabled = false; return tg.showAlert(res.error); }

        userSpins--;
        document.getElementById('spins-count').innerText = userSpins;
        currentPrize = res.prize;

        // Вставляем выигранный предмет в ленту
        const targetElement = document.getElementById('item-65');
        targetElement.innerHTML = `<img src="${currentPrize.image_url}"><span>${currentPrize.name}</span>`;
        targetElement.style.border = "2px solid var(--secondary)";
        targetElement.style.boxShadow = "0 0 15px var(--secondary)";

        // Анимация кручения
        const tape = document.getElementById('roulette-tape');
        const itemWidth = 130; // 120 width + 10 margin
        // Смещаем чтобы элемент 65 оказался по центру
        // Контейнер ~ 400px. Центр = 200px.
        const centerOffset = (tape.parentElement.offsetWidth / 2) - (itemWidth / 2);
        const randomPox = Math.floor(Math.random() * 80) - 40; // чуть рандома чтобы стрелка не вставала идеально ровно
        
        const shift = -(65 * itemWidth) + centerOffset + randomPox;

        // Запускаем CSS анимацию
        setTimeout(() => {
            tape.style.transition = 'transform 5s cubic-bezier(0.1, 0, 0, 1)';
            tape.style.transform = `translateX(${shift}px)`;
        }, 50);

        // Ждем конца анимации
        setTimeout(() => {
            document.getElementById('win-img').src = currentPrize.image_url;
            document.getElementById('win-name').innerText = currentPrize.name;
            showScreen('screen-win');
            btn.disabled = false;
        }, 5500);
    }

    // Отправка трейда
    async function sendTrade() {
        const tradeUrl = document.getElementById('trade-input').value;
        if (!tradeUrl.includes('steamcommunity.com/tradeoffer')) return tg.showAlert("Введите корректную Trade URL");

        await apiCall('/trade', 'POST', { tradeUrl, prizeName: currentPrize.name, username });
        tg.showAlert("Успешно! Ожидайте трейд от администратора.");
        showScreen('screen-main');
    }

    // Админка: Добавить приз
    async function addPrize() {
        const name = document.getElementById('ap-name').value;
        const image_url = document.getElementById('ap-img').value;
        const chance = parseInt(document.getElementById('ap-chance').value);
        if(!name || !image_url || !chance) return;
        
        await apiCall('/admin/prize', 'POST', { name, image_url, chance });
        tg.showAlert("Приз добавлен!");
        document.getElementById('ap-name').value = '';
    }

    // Старт
    checkUser();
</script>
</body>
</html>
